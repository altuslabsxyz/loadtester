# Local target: an EVM + CometBFT chain (e.g. brought up by a local init script).
name: local
chainId: 999
cosmosChainId: stable_999-1

nodes:
  - { name: validator, role: validator, jsonrpc: http://127.0.0.1:8565, cometRPC: http://127.0.0.1:26677 }
  - { name: fullnode,  role: fullnode,  jsonrpc: http://127.0.0.1:8545, cometRPC: http://127.0.0.1:26657 }
  - { name: vip,       role: vip,       jsonrpc: http://127.0.0.1:8555, cometRPC: http://127.0.0.1:26667 }

funding:
  masterKey: "0x3710c8ddb9863035a35a2b92f513b2f93c5ed26a9da6cd33490b76c4601385b0"
  accountsN: 20
  fundPerAccount: "1"

workload:
  durationSec: 120        # > 0 = one-shot; <= 0 = continuous (until Ctrl+C)
  allowDestructive: true  # enables bump / selfdestruct (local only)
  lanes:
    value:         { targetInflight: 50 }
    erc20Transfer: { targetInflight: 100 }
    swap:          { targetInflight: 50 }
    bump:          { targetInflight: 30 }
    selfdestruct:  { targetInflight: 20 }

observe:
  pollIntervalMs: 500
  drainWindowSec: 60
  reportIntervalSec: 30   # continuous-mode snapshot cadence
