# Testnet target template. Fill in real endpoints/keys.
name: testnet
chainId: 2201            # the testnet's EVM chain id
cosmosChainId: ""        # e.g. stable_2201-1

nodes:
  # List every reachable node. With >=2 nodes the app-hash collector can
  # cross-compare; with 1 it only detects stall/halt.
  - { name: node-a, role: fullnode,  jsonrpc: https://rpc-a.example/evm, cometRPC: https://rpc-a.example:26657 }
  - { name: node-b, role: validator, jsonrpc: https://rpc-b.example/evm, cometRPC: https://rpc-b.example:26657 }

funding:
  masterKey: "0x..."      # operator-provided funded key
  accountsN: 20
  fundPerAccount: "1"

workload:
  durationSec: 0          # 0 = CONTINUOUS: load runs until Ctrl+C (no drain/exit)
  allowDestructive: false # testnet-safe: no bump / selfdestruct by default
  lanes:
    value:         { targetInflight: 20 }
    erc20Transfer: { targetInflight: 40 }
    swap:          { targetInflight: 20 }

observe:
  pollIntervalMs: 1000
  drainWindowSec: 90
  reportIntervalSec: 60   # continuous-mode snapshot cadence
